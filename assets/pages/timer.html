<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/timer.css">
    <title>Our Journey - Timer</title>
</head>

<body>
    <main id="main_content">
        <section class="main_mat">

            <div class="mat">
                <div class="mat_item"><img src="../img/fotografias/mat_1.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_2.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_3.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_4.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_5.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_6.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_7.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_8.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_9.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_10.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_11.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_12.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_13.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_14.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_15.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_16.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_17.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_18.png" alt="nada"></div>
            </div>

            <div class="mat">
                <div class="mat_item"><img src="../img/fotografias/mat_18.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_17.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_16.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_15.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_14.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_13.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_12.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_11.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_10.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_8.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_7.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_6.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_5.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_4.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_3.png" alt="nada"></div>
                <div class="mat_item"><img src="../img/fotografias/mat_2.png" alt="nada"></div>
                <div class="mat_item"><img src="assets/img/fotografias/mat_1.png" alt="nada"></div>
            </div>

        </section>

        <section class="timer">
            <div class="photos">
                <div class="photo_item she">
                    <img src="../img/fotografias/capa_nadylla.png" alt="Uma mulher chamada Nádylla - a esposa.">
                </div>

                <div class="icone_coracao">
                    <img src="../img/icones/icone_coracao.png" alt="nada">
                </div>

                <div class="photo_item he">
                    <img src="../img/fotografias/capa_wellington.png"
                        alt="Um homem chamado Wellington - o marido.">
                </div>
            </div>

            <div class="texts">
                <h1>Nádylla & Wellington</h1>
                <p>Nosso amor transcende o tempo, e por ele lutarei todos os dias. Você é e sempre <br>será a mulher da
                    minha vida, minha esposa e minha melhor amiga.</p>
            </div>

            <div class="timer_count">
                <div class="timer_item">
                    <div class="timer_anos">0</div>
                    <p>anos</p>
                </div>

                <div class="timer_item">
                    <div class="timer_meses">0</div>
                    <p>meses</p>
                </div>

                <div class="timer_item">
                    <div class="timer_dias">0</div>
                    <p>dias</p>
                </div>

                <div class="timer_item">
                    <div class="timer_horas">00</div>
                    <p>horas</p>
                </div>

                <div class="timer_item">
                    <div class="timer_minutos">00</div>
                    <p>minutos</p>
                </div>

                <div class="timer_item">
                    <div class="timer_segundos">00</div>
                    <p>segundos</p>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/script.js"></script>
</body>

</html>
