<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/main.css">
    <title>Our Journey</title>
</head>

<body>
    <main id="main_content">
        <section class="main_text">

            <div class="main_title">
                <h1><span>Chegou o dia,</span> nosso dia ! </h1>
                <img src="assets/img/imagens/balao_coracao_pequeno.png" alt="Um balão de coração.">
            </div>

            <p class="main_description">Esse é o seu presente, espero que goste.</p>

            <button class="main_button" onclick="window.location.href='assets/pages/timer.html'">Abrir</button>
        </section>

        <section class="main_galary">
            <section class="galary">
                <img id="balao_esquerdo" src="assets/img/imagens/balao_coracao_grande_esquerdo.png"
                    alt="Um balão de coração.">
                <div class="galary_item primeira">
                    <img src="assets/img/fotografias/galeria_1.png" alt="Uma foto nossa.">
                </div>
                <div class="galary_item segunda">
                    <img src="assets/img/fotografias/galeria_2.png" alt="Uma foto nossa.">
                </div>
                <div class="galary_item terceira">
                    <img src="assets/img/fotografias/galeria_3.png" alt="Uma foto nossa.">
                </div>
                <div class="galary_item quarta">
                    <img src="assets/img/fotografias/galeria_4.png" alt="Uma foto nossa.">
                </div>
                <img id="balao_direito" src="assets/img/imagens/balao_coracao_grande_direito.png"
                    alt="Um balão de coração.">
            </section>
        </section>

        <!-- <img id="balao_esquerdo" src="assets/img/imagens/balao_coracao_grande_direito.png" alt="Um balão de coração."> -->
    </main>

    <audio id="audio" autoplay loop>
        <source src="/assets/audio/musica.mp3" type="audio/mpeg">
    </audio>
    <script src="/assets/js/script.js"></script>
</body>

</html>
